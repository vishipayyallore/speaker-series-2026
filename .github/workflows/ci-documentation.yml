name: Documentation Quality (Markdown & Links)

on:
  push:
    paths:
      - '**.md'
      - 'lychee.toml'
      - '.markdownlint*.json'
      - '.markdownlint*.yaml'
      - '.github/workflows/ci-documentation.yml'
  pull_request:
    paths:
      - '**.md'
      - 'lychee.toml'
      - '.markdownlint*.json'
      - '.markdownlint*.yaml'
      - '.github/workflows/ci-documentation.yml'
  workflow_dispatch: # Allow manual trigger

jobs:
  markdown-lint:
    name: Markdown Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare documentation CI log directory
        run: mkdir -p .ci-logs

      - name: Run Markdown linting
        run: |
          set -euo pipefail
          # Run markdownlint-cli2 on the canonical documentation surfaces.
          npx --yes markdownlint-cli2 --config .markdownlint-cli2.yaml \
            "README.md" \
            "CONTRIBUTING.md" \
            "AGENTS.md" \
            "CLAUDE.md" \
            "docs/**/*.md" \
            "talks/**/*.md" \
            "templates/**/*.md" \
            "src/**/*.md" \
            "tools/**/*.md" | tee .ci-logs/01-markdownlint.log
      - name: Upload documentation CI logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-documentation-logs
          path: .ci-logs/
          retention-days: 7
      - name: Publish documentation CI summary
        if: always()
        run: |
          {
            echo "## Documentation CI summary"
            echo ""
            echo "- Branch/ref: \`${GITHUB_REF}\`"
            echo "- markdown-lint status: \`${{ job.status }}\`"
            echo "- Artifact: \`ci-documentation-logs\`"
          } >> "$GITHUB_STEP_SUMMARY"

  link-checker:
    name: Link Checking (Lychee)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Run lychee link checker
        uses: lycheeverse/lychee-action@v2
        with:
          # Use the existing lychee.toml configuration
          args: >-
            --config lychee.toml --cache --max-cache-age 1d
            README.md CONTRIBUTING.md AGENTS.md CLAUDE.md docs/**/*.md talks/**/*.md templates/**/*.md src/**/*.md tools/**/*.md
          # Fail on broken links
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create lychee report artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lychee-report
          path: ./lychee/out.md
          retention-days: 7
